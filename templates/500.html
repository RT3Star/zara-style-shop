{% extends 'base.html' %}

{% block title %}500 | Помилка сервера{% endblock %}

{% block content %}
<div class="container" style="margin-top: 150px; min-height: 60vh;">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="error-code" style="font-size: 8rem; font-weight: 300; color: #ccc;">500</div>
            <h1 class="error-title" style="font-size: 1.8rem; font-weight: 300; letter-spacing: 3px;">ПОМИЛКА СЕРВЕРА</h1>
            <p class="error-text" style="color: #666; margin: 1rem 0;">
                Вибачте, сталася технічна помилка. Ми вже працюємо над її виправленням.
            </p>
            <div class="error-actions">
                <a href="{% url 'shopee:home' %}" class="btn" style="background: #000; color: #fff; padding: 0.8rem 2rem; text-decoration: none; margin: 0.5rem; display: inline-block; border-radius: 0;">На головну</a>
                <a href="javascript:location.reload()" class="btn" style="background: transparent; border: 1px solid #ddd; color: #666; padding: 0.8rem 2rem; text-decoration: none; margin: 0.5rem; display: inline-block; border-radius: 0;">Спробувати ще раз</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
