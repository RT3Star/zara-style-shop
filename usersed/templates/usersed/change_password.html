{% extends 'base.html' %}
{% load static %}

{% block title %}ZARA | Зміна пароля{% endblock %}

{% block content %}
<div class="change-password-page" style="margin-top: 120px; min-height: 60vh;">
  <div class="container">
    <div class="password-container">
      <h1 class="section-title">ЗМІНА ПАРОЛЯ</h1>

      <form method="post" class="password-form">
        {% csrf_token %}

        <div class="form-group">
          <label>Старий пароль</label>
          {{ form.old_password }}
        </div>

        <div class="form-group">
          <label>Новий пароль</label>
          {{ form.new_password1 }}
          <div class="password-hint">Мінімум 8 символів</div>
        </div>

        <div class="form-group">
          <label>Підтвердіть новий пароль</label>
          {{ form.new_password2 }}
        </div>

        <div class="form-actions">
          <button type="submit" class="change-btn">ЗМІНИТИ ПАРОЛЬ</button>
          <a href="{% url 'usersed:profile' %}" class="cancel-btn">СКАСУВАТИ</a>
        </div>
      </form>
    </div>
  </div>
</div>

<style>
.password-container {
  max-width: 500px;
  margin: 0 auto;
  padding: 2rem;
}
.password-form {
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}
.form-group label {
  display: block;
  font-size: 0.7rem;
  letter-spacing: 1px;
  margin-bottom: 0.3rem;
  color: #666;
}
.form-group input {
  width: 100%;
  padding: 0.8rem;
  border: 1px solid #ddd;
  font-family: 'Montserrat', sans-serif;
}
.form-group input:focus {
  outline: none;
  border-color: #000;
}
.password-hint {
  font-size: 0.65rem;
  color: #999;
  margin-top: 0.3rem;
}
.form-actions {
  display: flex;
  gap: 1rem;
  margin-top: 0.5rem;
}
.change-btn {
  flex: 1;
  padding: 0.8rem;
  background: #000;
  color: #fff;
  border: none;
  cursor: pointer;
  letter-spacing: 2px;
  font-size: 0.8rem;
}
.cancel-btn {
  flex: 1;
  padding: 0.8rem;
  background: transparent;
  border: 1px solid #ddd;
  color: #666;
  text-align: center;
  text-decoration: none;
  font-size: 0.8rem;
  letter-spacing: 2px;
}
</style>
{% endblock %}
