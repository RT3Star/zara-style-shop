{% extends 'base.html' %}
{% load static %}

{% block title %}ZARA | Вхід{% endblock %}

{% block content %}
<div class="auth-page" style="margin-top: 120px; min-height: 60vh; display: flex; align-items: center;">
  <div class="container">
    <div class="auth-container">
      <h1 class="section-title">ВХІД</h1>
      <form method="post" class="auth-form">
        {% csrf_token %}
        <div class="form-group">
          <input type="text" name="username" placeholder="Ім'я користувача" class="auth-input" required>
        </div>
        <div class="form-group">
          <input type="password" name="password" placeholder="Пароль" class="auth-input" required>
        </div>
        <button type="submit" class="auth-btn">УВІЙТИ</button>
      </form>
      <p class="auth-link">Немає акаунту? <a href="{% url 'usersed:register' %}">Зареєструватися</a></p>
    </div>
  </div>
</div>

<style>
.auth-container {
  max-width: 400px;
  margin: 0 auto;
  padding: 2rem;
}
.auth-form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.auth-input {
  width: 100%;
  padding: 0.8rem;
  border: 1px solid #ddd;
  font-family: 'Montserrat', sans-serif;
}
.auth-btn {
  width: 100%;
  padding: 0.8rem;
  background: #000;
  color: #fff;
  border: none;
  cursor: pointer;
  letter-spacing: 2px;
  font-size: 0.8rem;
}
.auth-link {
  text-align: center;
  margin-top: 1rem;
  font-size: 0.8rem;
}
.auth-link a {
  color: #000;
  text-decoration: none;
  border-bottom: 1px solid #000;
}
</style>
{% endblock %}
